version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "15432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    ports:
      - "18000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_started
    volumes:
      - ./backend:/app/backend
      - ./crawler:/app/crawler
    command: python manage.py runserver 0.0.0.0:8000
    working_dir: /app/backend
    healthcheck:
      test: ["CMD", "python", "-c", "import socket;s=socket.create_connection(('127.0.0.1',8000),2);s.close()"]
      interval: 5s
      timeout: 3s
      retries: 20

  celery_worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./crawler:/app/crawler
    command: celery -A config worker -l info
    working_dir: /app/backend

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: npm run dev -- --host 0.0.0.0
    working_dir: /app/frontend
    depends_on:
      backend:
        condition: service_healthy

  crawler:
    build:
      context: .
      dockerfile: docker/crawler.Dockerfile
    env_file:
      - .env
    depends_on:
      - mongo
    volumes:
      - ./crawler:/app/crawler
    command: tail -f /dev/null
    working_dir: /app/crawler

volumes:
  pg_data:
  mongo_data:
