version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "15432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - "16379:6379"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    ports:
      - "18000:8000"
    depends_on:
      - postgres
      - redis
      - mongo
    volumes:
      - ./backend:/app/backend
      - ./crawler:/app/crawler
    command: python manage.py runserver 0.0.0.0:8000
    working_dir: /app/backend

  celery_worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app/backend
      - ./crawler:/app/crawler
    command: celery -A config worker -l info
    working_dir: /app/backend

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: npm run dev -- --host 0.0.0.0
    working_dir: /app/frontend
    depends_on:
      - backend

  crawler:
    build:
      context: .
      dockerfile: docker/crawler.Dockerfile
    env_file:
      - .env
    depends_on:
      - mongo
    volumes:
      - ./crawler:/app/crawler
    command: tail -f /dev/null
    working_dir: /app/crawler

volumes:
  pg_data:
  mongo_data:
